<!Doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Palindrome Checker</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="header">
      <h1 id="headerText">Is it a Palindrome?</h1>
    </div>
    <div class ="inputBox">
      <span id="pText">Enter in text to check for a palindrome:</span>
      <div class="input">
      <input 
      type="text"
      id="text-input"
      >
      <button 
      type="submit"
      id="check-btn">
        Check
        </button>
      </div>
      <div>
        <p id ="result">Test</p>
      </div>
    </div>
    <div class="infoBox">
      <p id="infoText">A palindrome is a word or sentence that's spelled the same way both forward and backward, ignoring punctuation, case, and spacing.</p>
    </div>
   <script src="script.js"></script>
  </body>
</html>
